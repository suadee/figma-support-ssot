name: bootstrap
# 1회용: SSoT 스캐폴드 전체를 커밋한 뒤 스스로 삭제됩니다.
on:
  workflow_dispatch:
 
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 스캐폴드 생성
        run: |
          mkdir -p "$(dirname '.github/workflows/figma-help-sync.yml')"
          echo '' | base64 -d > '.github/workflows/figma-help-sync.yml'
          mkdir -p "$(dirname '.github/workflows/monthly-stale-check.yml')"
          echo '' | base64 -d > '.github/workflows/monthly-stale-check.yml'
          mkdir -p "$(dirname '.github/workflows/on-merge-fill-approval.yml')"
          echo '' | base64 -d > '.github/workflows/on-merge-fill-approval.yml'
          mkdir -p "$(dirname 'README.md')"
          echo '' | base64 -d > 'README.md'
          mkdir -p "$(dirname 'figma-help/.gitkeep')"
          echo '' | base64 -d > 'figma-help/.gitkeep'
          mkdir -p "$(dirname 'guidelines/TEMPLATE.md')"
          echo '' | base64 -d > 'guidelines/TEMPLATE.md'
          mkdir -p "$(dirname 'mail-threads/.gitkeep')"
          echo '' | base64 -d > 'mail-threads/.gitkeep'
          mkdir -p "$(dirname 'scripts/category_map.json')"
          echo '' | base64 -d > 'scripts/category_map.json'
          mkdir -p "$(dirname 'scripts/check_stale.py')"
          echo '' | base64 -d > 'scripts/check_stale.py'
          mkdir -p "$(dirname 'scripts/common.py')"
          echo '' | base64 -d > 'scripts/common.py'
          mkdir -p "$(dirname 'scripts/fill_approval.py')"
          echo '' | base64 -d > 'scripts/fill_approval.py'
          mkdir -p "$(dirname 'scripts/ingest_figma_help.py')"
          echo '' | base64 -d > 'scripts/ingest_figma_help.py'
          mkdir -p "$(dirname 'scripts/ingest_outlook.py')"
          echo '' | base64 -d > 'scripts/ingest_outlook.py'
          mkdir -p "$(dirname 'state/.gitkeep')"
          echo '' | base64 -d > 'state/.gitkeep'
      - name: 커밋
        run: |
          rm -f .github/workflows/bootstrap.yml
          git config user.name "ssot-bootstrap"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "init: SSoT 스캐폴드 (bootstrap)"
          git push
 
